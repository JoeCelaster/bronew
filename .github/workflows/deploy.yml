name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set execute permissions
        run: chmod +x scripts/*.sh

      - name: Build Docker image
        run: |
          docker build -t bronew:latest .
          docker tag bronew:latest ghcr.io/joecelaster/bronew:latest

      # Optional: gated migration step here if you want

      - name: Deploy
        run: bash scripts/deploy.sh

      - name: Health check
        run: bash scripts/health-check.sh