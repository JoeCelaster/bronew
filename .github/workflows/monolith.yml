# ──────────────────────────────────────────────────────────────────────────────
# monolith.yml — Generated by monolithx (simple mode)
#
# Single-job, single-file CI/CD workflow for Node.js.
# Runs in one job so Docker images built here are available to deploy steps
# on the same runner — no registry, no job isolation problems.
#
# To change the working directory (e.g. for a monorepo sub-folder):
#   1. Edit the WORK_DIR env var below, OR
#   2. Set the repository variable WORK_DIR in GitHub Settings → Variables
# ──────────────────────────────────────────────────────────────────────────────
name: Monolith CI/CD

on:
  push:
    branches:
      - "main"
      - "staging"
  pull_request:

concurrency:
  group: monolith-${{ github.ref }}
  cancel-in-progress: true

env:
  # Working directory — change this if your project lives in a sub-folder
  WORK_DIR: ${{ vars.WORK_DIR || '.' }}
  IMAGE_NAME: bronew
  PORT: 3000

jobs:
  # ── Single job: CI → Build → Simulate Deploy ────────────────────────────────
  # Everything runs on the same runner so the locally-built Docker image
  # is available for the deploy simulation without needing a registry.
  ci-build-deploy:
    name: "CI → Build → Deploy (bronew)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: ${{ env.WORK_DIR }}
        run: npm install --prefer-offline --no-audit --no-fund

      # ── 4. Lint ───────────────────────────────────────────────────────────────
      - name: Lint
        working-directory: ${{ env.WORK_DIR }}
        continue-on-error: true
        run: npm run lint --if-present

      # ── 5. Test ───────────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: ${{ env.WORK_DIR }}
        run: npm test --if-present

      # ── 6. Build application ──────────────────────────────────────────────────
      - name: Build application
        working-directory: ${{ env.WORK_DIR }}
        run: npm run build --if-present

      # ── 7. Docker build ───────────────────────────────────────────────────────
      # Builds image locally on this runner with two tags:
      #   <image>:<git-sha>  — immutable, unique per commit
      #   <image>:latest     — mutable convenience tag
      # No push to a registry; the image lives on this runner for the deploy step.
      - name: Build Docker image
        working-directory: ${{ env.WORK_DIR }}
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      # ── 8. Verify image exists ────────────────────────────────────────────────
      - name: Verify Docker image was built
        run: |
          docker image inspect ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --format "Image ID: {{.Id}} | Created: {{.Created}}"

      # ── 9. Simulate deployment ────────────────────────────────────────────────
      # Runs the container on this runner to prove the image starts correctly.
      # In a real deployment, replace this step with SSH / kubectl / ecs deploy.
      - name: Simulate deployment (smoke test)
        run: |
          echo "🚀 Starting container ${{ env.IMAGE_NAME }}:${{ github.sha }} on port ${{ env.PORT }}..."
          docker run -d \
            --name bronew-smoke \
            -p ${{ env.PORT }}:${{ env.PORT }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

          # Primary check: container hasn't exited — works for ANY Docker image
          # regardless of whether it exposes an HTTP endpoint.
          echo "⏳ Waiting 15 s to confirm container stays running..."
          sleep 15
          STATE=$(docker inspect --format '{{.State.Running}}' bronew-smoke 2>/dev/null || echo "false")
          if [ "${STATE}" != "true" ]; then
            echo "❌ Container exited unexpectedly. Last logs:"
            docker logs bronew-smoke
            exit 1
          fi
          echo "✅ Container is still running — deployment simulation PASSED"

      # ── 9b. HTTP health probe (informational — non-blocking) ─────────────────
      # Does NOT fail the job if your app doesn't expose HEALTH_PATH.
      # Covers any project without a dedicated HTTP health route.
      - name: HTTP health probe (informational)
        continue-on-error: true
        run: |
          echo "ℹ️  Probing http://localhost:${{ env.PORT }}/health ..."
          for i in $(seq 1 10); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 3 \
              http://localhost:${{ env.PORT }}/health || echo "000")
            if [ "${STATUS}" -ge 200 ] && [ "${STATUS}" -lt 400 ]; then
              echo "✅ Health endpoint responded HTTP ${STATUS} on attempt ${i}/10"
              exit 0
            fi
            echo "  attempt ${i}/10 — HTTP ${STATUS}"
            sleep 3
          done
          echo "ℹ️  No HTTP 2xx on /health — app may not expose this route (non-fatal)"

      # ── 10. Rollback-ready tag ────────────────────────────────────────────────
      # Tags this SHA as the "previous" candidate so rollback can reference it.
      # In a registry-backed pipeline, you'd push both tags to GHCR here.
      - name: Tag image as rollback candidate
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:previous
          echo "🔖 Tagged ${{ env.IMAGE_NAME }}:${{ github.sha }} → previous"

      # ── 11. Cleanup ────────────────────────────────────────────────────────────
      - name: Stop smoke-test container
        if: always()
        run: |
          docker stop bronew-smoke 2>/dev/null || true
          docker rm   bronew-smoke 2>/dev/null || true
