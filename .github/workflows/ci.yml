name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          npm run start &
          echo $! > app.pid

      - name: Wait for server
        run: sleep 10

      - name: Smoke test (ping /)
        run: |
          curl -f http://localhost:3000 || (echo "App did not respond" && exit 1)

      - name: Stop app
        if: always()
        run: |
          kill $(cat app.pid) || true