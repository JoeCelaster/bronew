name: Build (Docker)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/joecelaster/bronew:latest .
          docker tag ghcr.io/joecelaster/bronew:latest ghcr.io/joecelaster/bronew:${{ github.sha }}

      - name: Push image
        run: |
          docker push ghcr.io/joecelaster/bronew:latest
          docker push ghcr.io/joecelaster/bronew:${{ github.sha }}